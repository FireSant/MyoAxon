name: myoaxon
description: "A new Flutter project for physical training tracking."
publish_to: 'none'
version: 0.4.0+1

environment:
  sdk: '^3.2.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase Backend
  firebase_core: ^3.15.2
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.6.12

  # State Management
  flutter_riverpod: ^2.5.1

  # UI and Charts
  fl_chart: ^0.68.0
  flutter_typeahead: ^5.1.0
  intl: ^0.19.0
  
  # Video & CV (Temporarily disabled for debugging)
  image_picker: ^1.1.2
  video_player: ^2.9.2
  video_thumbnail: ^0.5.3
  image: ^4.1.7
  path_provider: ^2.1.3

  # Utils
  uuid: ^4.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  archive: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
